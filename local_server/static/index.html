<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADK Voice — Local Server</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <h1>ADK Voice (Local)</h1>
    <p class="hint">Connects to <code>local_server</code> → Runner.run_live()</p>
    <div class="controls">
      <button id="connectBtn">Connect</button>
      <button id="micBtn" disabled>Start Mic</button>
      <button id="stopMicBtn" disabled>Stop Mic</button>
    </div>
    <div class="row">
      <input id="textInput" type="text" placeholder="Type a message..." />
      <button id="sendBtn" disabled>Send</button>
    </div>
    <section>
      <h2>Transcript</h2>
      <pre id="log"></pre>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
